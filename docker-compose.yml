services:
  app:
    build: .
    image: green-api-test:local
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8080}
      GREEN_API_BASE_URL: ${GREEN_API_BASE_URL:-https://api.green-api.com}
      GREEN_API_TIMEOUT: ${GREEN_API_TIMEOUT:-15s}
